  - ticker: "482730"
    nickname: "S&P500 타겟데일리커버드콜 (TIGER)"
    one_line: "S&P500을 보유하면서 매일 커버드콜로 옵션프리미엄을 받음. 월배당. 상승장에선 S&P500보다 덜 오를 수 있음."
    category: us_stock
  - ticker: "474220"
    nickname: "나스닥100 타겟데일리커버드콜 (TIGER) — JEPQ 친척"
    one_line: "나스닥100 + 커버드콜 월배당. JEPQ에 가까운 한국판."
    category: us_stock

  # ─── 한국 ───
  - ticker: "069500"
    nickname: "한국 KOSPI 200 (KODEX)"
    one_line: "코스피200 추종. 한국 대형주 통째로."
    category: kr_stock

  # ─── 채권 (안정자산) ───
  - ticker: "365780"
    nickname: "미국 10년 국채 선물 (KODEX)"
    one_line: "미 10년 국채. 주식과 반대로 움직이는 경향. 포트폴리오 충격 흡수용."
    category: bond
