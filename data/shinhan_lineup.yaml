# 신한투자증권 퇴직연금에서 실제 매수 가능한 상품 목록.
# 이 파일이 진실의 원천(source of truth). 여기 등록된 종목만 사이트에 노출됨.
#
# 작성 방법:
# 1) 아빠 신한투자증권 MTS → 퇴직연금 → 운용상품 조회 (또는 매수 가능 종목 검색)
# 2) ETF는 6자리 KRX 티커를 적습니다.
# 3) TDF/펀드는 운용사명 + 정식 펀드명 + (가능하면) 협회 코드.
#
# nickname/one_line은 비워두면 자동 수집 시 운용사 자료에서 추출 시도.
# 비워두면 그냥 정식명만 노출됩니다.

etf:
  # ─── S&P500 패밀리 (퇴직연금 최인기) ───
  - ticker: "360750"
    nickname: "미국 S&P500 (TIGER)"
    one_line: "S&P500 추종 + 분배. 거래량·시총 1위 형."
