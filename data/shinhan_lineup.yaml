    category: us_stock

  # ─── 나스닥100 ───
  - ticker: "133690"
    nickname: "미국 나스닥100 (TIGER)"
    one_line: "애플·MS·엔비디아 등 빅테크 100개. 변동성 크지만 장기 성장률 높음."
    category: us_stock

  # ─── JEPI 한국판 (커버드콜 / 월배당) ───
  - ticker: "458730"
    nickname: "미국배당+7%프리미엄다우존스 (TIGER) — JEPI 친척"
    one_line: "다우존스 우량주에 커버드콜을 얹어 월배당 약 7% 목표. JEPI에 가장 가까운 한국판."
